services:
  - type: web
    name: barangay-cashbook
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CASHBOOK_AUTOSEED
        value: "1"
